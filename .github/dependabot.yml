version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Group all non-security updates into one PR instead of many
    groups:
      all-dependencies:
        patterns:
          - "*"
    # Only open max 5 PRs at a time
    open-pull-requests-limit: 5
    # Auto-merge patch and minor updates
    commit-message:
      prefix: "chore(deps):"
